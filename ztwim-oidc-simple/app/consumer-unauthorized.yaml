apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-unauthorized
  namespace: ztwim-oidc-simple
  labels:
    app: consumer-unauthorized
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-unauthorized
  template:
    metadata:
      labels:
        app: consumer-unauthorized
    spec:
      serviceAccountName: oidc-consumer-unauth
      containers:
        - name: consumer
          image: quay.io/tssc_demos/ztwim-oidc-simple:latest
          command: ["python", "/app/consumer.py"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATA_SERVICE_URL
              value: "http://data-service.ztwim-oidc-simple.svc:8080/secret"
            - name: JWT_FILE
              value: "/certs/jwt_svid.token"
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
        - name: spiffe-helper
          image: registry.redhat.io/zero-trust-workload-identity-manager/spiffe-helper-rhel9:v0.10.0
          args: ["-config", "/config/helper.conf"]
          volumeMounts:
            - name: spiffe
              mountPath: /spiffe-workload
              readOnly: true
            - name: certs
              mountPath: /certs
            - name: helper-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: spiffe
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: certs
          emptyDir: {}
        - name: helper-config
          configMap:
            name: spiffe-helper-config
---
apiVersion: v1
kind: Service
metadata:
  name: consumer-unauthorized
  namespace: ztwim-oidc-simple
spec:
  selector:
    app: consumer-unauthorized
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: consumer-unauthorized
  namespace: ztwim-oidc-simple
spec:
  to:
    kind: Service
    name: consumer-unauthorized
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
