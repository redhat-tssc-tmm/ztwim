apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: ztwim-oidc-simple
  labels:
    app: data-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
    spec:
      serviceAccountName: data-service
      containers:
        - name: data-service
          image: quay.io/tssc_demos/ztwim-oidc-simple:latest
          command: ["python", "/app/data_service.py"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JWKS_URL
              value: "https://spire-oidc.apps.cluster-lhnrw.dynamic2.redhatworkshops.io/keys"
            - name: EXPECTED_AUDIENCE
              value: "data-service"
            - name: ALLOWED_SPIFFE_IDS
              value: "spiffe://idc.com/ns/ztwim-oidc-simple/sa/oidc-consumer"
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
        - name: spiffe-helper
          image: registry.redhat.io/zero-trust-workload-identity-manager/spiffe-helper-rhel9:v0.10.0
          args: ["-config", "/config/helper.conf"]
          volumeMounts:
            - name: spiffe
              mountPath: /spiffe-workload
              readOnly: true
            - name: certs
              mountPath: /certs
            - name: helper-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: spiffe
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: certs
          emptyDir: {}
        - name: helper-config
          configMap:
            name: spiffe-helper-config
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: ztwim-oidc-simple
spec:
  selector:
    app: data-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
