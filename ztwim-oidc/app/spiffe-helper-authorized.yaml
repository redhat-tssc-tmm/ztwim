apiVersion: v1
kind: ConfigMap
metadata:
  name: spiffe-helper-authorized
  namespace: ztwim-oidc
data:
  helper.conf: |
    agent_address = "/spiffe-workload/spire-agent.sock"
    svid_file_name = "/certs/tls.crt"
    svid_key_file_name = "/certs/tls.key"
    svid_bundle_file_name = "/certs/bundle.crt"
    daemon_mode = true
    jwt_svids = [{jwt_audience = "tpa-spiffe", jwt_svid_file_name = "/certs/jwt_svid.token"}]
